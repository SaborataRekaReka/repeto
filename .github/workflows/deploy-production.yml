name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Validate required secrets
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "${PROD_SSH_PRIVATE_KEY:-}" ] && [ -z "${PROD_SSH_PASSWORD:-}" ]; then
            missing+=("PROD_SSH_PRIVATE_KEY or PROD_SSH_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          default_known_hosts="repeto.ru ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPg9IU90Ep/dwrVa6/rJk5Pzu9kMAF9C1sn4HWgu9Gbt"

          install -m 700 -d ~/.ssh
          if [ -n "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -n "${PROD_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          elif [ "$ssh_host" = "repeto.ru" ] || [ "$ssh_host" = "72.56.240.222" ]; then
            printf '%s\n' "$default_known_hosts" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H -p "$ssh_port" "$ssh_host" >> ~/.ssh/known_hosts
          fi

      - name: Deploy on VPS
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_PATH: ${{ secrets.PROD_APP_PATH }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"

          if [ -n "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            auth_mode="key"
          elif [ -n "${PROD_SSH_PASSWORD:-}" ]; then
            auth_mode="password"
          else
            echo "::error::No SSH auth configured. Set PROD_SSH_PRIVATE_KEY or PROD_SSH_PASSWORD"
            exit 1
          fi

          if [ "$auth_mode" = "password" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

          run_ssh() {
            local target="$1"
            local command="$2"

            if [ "$auth_mode" = "key" ]; then
              ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "$command"
            else
              sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "$command"
            fi
          }

          run_ssh_script() {
            local target="$1"

            if [ "$auth_mode" = "key" ]; then
              ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "PROD_APP_PATH='$PROD_APP_PATH' bash -se"
            else
              sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "PROD_APP_PATH='$PROD_APP_PATH' bash -se"
            fi
          }

          if [ -n "${PROD_SSH_USER:-}" ]; then
            user_candidates=("$PROD_SSH_USER")
          else
            user_candidates=(root ubuntu deploy)
          fi

          selected_user=""
          for candidate in "${user_candidates[@]}"; do
            if run_ssh "$candidate@$ssh_host" "echo ok" >/dev/null 2>&1; then
              selected_user="$candidate"
              break
            fi
          done

          if [ -z "$selected_user" ]; then
            echo "::error::Cannot connect via SSH. Set PROD_SSH_USER explicitly or verify key access."
            exit 1
          fi

          echo "Using SSH user: $selected_user"

          run_ssh_script "$selected_user@$ssh_host" <<'EOF'
          set -euo pipefail

          if [ -n "${PROD_APP_PATH:-}" ] && [ -f "$PROD_APP_PATH/docker-compose.prod.yml" ]; then
            app_path="$PROD_APP_PATH"
          else
            app_path=""
            candidate_paths=(
              /root/repeto/app
              /home/ubuntu/repeto/app
              /home/deploy/repeto/app
              /opt/repeto/app
            )

            for p in "${candidate_paths[@]}"; do
              if [ -f "$p/docker-compose.prod.yml" ]; then
                app_path="$p"
                break
              fi
            done
          fi

          if [ -z "$app_path" ]; then
            echo "::error::Cannot detect app path. Set PROD_APP_PATH secret to directory containing docker-compose.prod.yml"
            exit 1
          fi

          echo "Using app path: $app_path"
          cd "$app_path"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml exec -T backend wget --spider -q http://localhost:3200/api/health
          EOF

      - name: Verify production endpoints
        shell: bash
        run: |
          set -euo pipefail

          root_status="$(curl -s -o /dev/null -w "%{http_code}" https://repeto.ru/)"
          api_status="$(curl -s -o /dev/null -w "%{http_code}" https://repeto.ru/api/health)"
          redirect_location="$(curl -sSIL https://repeto.ru/ | awk 'BEGIN {IGNORECASE=1} /^location:/ {print $2}' | tail -n1 | tr -d '\r')"

          echo "Root status: $root_status"
          echo "API status: $api_status"
          echo "Root redirect location: ${redirect_location:-<none>}"

          if [ "$root_status" -ge 500 ]; then
            echo "::error::Frontend root is not healthy"
            exit 1
          fi

          if [ "$api_status" -ge 500 ]; then
            echo "::error::API health endpoint is not healthy"
            exit 1
          fi

          if [ "$redirect_location" = "/bazarly/index.html" ]; then
            echo "::error::Root still redirects to /bazarly/index.html"
            exit 1
          fi
