name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend-gravity/**
      - deploy/**
      - docker-compose.prod.yml
      - docker-compose.yml
  workflow_dispatch:
    inputs:
      seed_demo_data:
        description: "Create or update 2 demo tutors and 7 demo students on production"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Validate required secrets
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SSH_PRIVATE_KEY:-}" ] && [ -z "${PROD_SSH_PASSWORD:-}" ]; then
            echo "::error::Missing required secrets: set PROD_SSH_PRIVATE_KEY or PROD_SSH_PASSWORD"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          default_known_hosts="repeto.ru ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPg9IU90Ep/dwrVa6/rJk5Pzu9kMAF9C1sn4HWgu9Gbt"

          install -m 700 -d ~/.ssh

          if [ -n "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -n "${PROD_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          elif [ "$ssh_host" = "repeto.ru" ] || [ "$ssh_host" = "72.56.240.222" ]; then
            printf '%s\n' "$default_known_hosts" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H -p "$ssh_port" "$ssh_host" >> ~/.ssh/known_hosts
          fi

      - name: Install sshpass when password-only auth is needed
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${PROD_SSH_PASSWORD:-}" ] && [ -z "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          else
            echo "Skipping sshpass installation (key auth available or password not set)."
          fi

      - name: Resolve SSH access
        id: resolve_ssh
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"

          has_key="false"
          has_password="false"
          [ -n "${PROD_SSH_PRIVATE_KEY:-}" ] && has_key="true"
          [ -n "${PROD_SSH_PASSWORD:-}" ] && has_password="true"

          if [ -n "${PROD_SSH_USER:-}" ]; then
            user_candidates=("$PROD_SSH_USER")
          else
            user_candidates=(root ubuntu deploy)
          fi

          selected_user=""
          auth_mode=""

          for candidate in "${user_candidates[@]}"; do
            target="$candidate@$ssh_host"

            if [ "$has_key" = "true" ]; then
              if ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "echo ok" >/dev/null 2>&1; then
                selected_user="$candidate"
                auth_mode="key"
                break
              fi
            fi

            if [ "$has_password" = "true" ]; then
              if sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "echo ok" >/dev/null 2>&1; then
                selected_user="$candidate"
                auth_mode="password"
                break
              fi
            fi
          done

          if [ -z "$selected_user" ] || [ -z "$auth_mode" ]; then
            echo "::error::Cannot connect via SSH with provided secrets (user/key/password)."
            exit 1
          fi

          echo "selected_user=$selected_user" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$auth_mode" >> "$GITHUB_OUTPUT"

      - name: Resolve app path on VPS
        id: resolve_path
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_APP_PATH: ${{ secrets.PROD_APP_PATH }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"

          if [ "$AUTH_MODE" = "key" ]; then
            app_path=$(ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "PROD_APP_PATH='$PROD_APP_PATH' bash -se" <<'EOF'
          set -euo pipefail

          if [ -n "${PROD_APP_PATH:-}" ] && [ -f "$PROD_APP_PATH/docker-compose.prod.yml" ]; then
            echo "$PROD_APP_PATH"
            exit 0
          fi

          for p in /root/repeto/app /home/ubuntu/repeto/app /home/deploy/repeto/app /opt/repeto/app; do
            if [ -f "$p/docker-compose.prod.yml" ]; then
              echo "$p"
              exit 0
            fi
          done

          found_compose="$(find /root /home /opt /srv -maxdepth 5 -type f -name docker-compose.prod.yml 2>/dev/null | head -n1 || true)"
          if [ -n "$found_compose" ]; then
            dirname "$found_compose"
            exit 0
          fi

          exit 1
          EOF
          )
          else
            app_path=$(sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "PROD_APP_PATH='$PROD_APP_PATH' bash -se" <<'EOF'
          set -euo pipefail

          if [ -n "${PROD_APP_PATH:-}" ] && [ -f "$PROD_APP_PATH/docker-compose.prod.yml" ]; then
            echo "$PROD_APP_PATH"
            exit 0
          fi

          for p in /root/repeto/app /home/ubuntu/repeto/app /home/deploy/repeto/app /opt/repeto/app; do
            if [ -f "$p/docker-compose.prod.yml" ]; then
              echo "$p"
              exit 0
            fi
          done

          found_compose="$(find /root /home /opt /srv -maxdepth 5 -type f -name docker-compose.prod.yml 2>/dev/null | head -n1 || true)"
          if [ -n "$found_compose" ]; then
            dirname "$found_compose"
            exit 0
          fi

          exit 1
          EOF
          )
          fi

          if [ -z "$app_path" ]; then
            echo "::error::Cannot detect app path on VPS."
            exit 1
          fi

          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Sync backend .env from GitHub secret
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          PROD_BACKEND_ENV: ${{ secrets['PROD_BACKEND_ENV'] }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
          APP_PATH: ${{ steps.resolve_path.outputs.app_path }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_BACKEND_ENV:-}" ]; then
            echo "PROD_BACKEND_ENV is not set. Keeping existing backend/.env on VPS."
            exit 0
          fi

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"
          backend_env_b64="$(printf '%s' "$PROD_BACKEND_ENV" | base64 | tr -d '\n')"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' BACKEND_ENV_B64='$backend_env_b64' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          umask 077
          mkdir -p backend
          printf '%s' "$BACKEND_ENV_B64" | base64 -d | tr -d '\r' > backend/.env
          test -s backend/.env
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' BACKEND_ENV_B64='$backend_env_b64' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          umask 077
          mkdir -p backend
          printf '%s' "$BACKEND_ENV_B64" | base64 -d | tr -d '\r' > backend/.env
          test -s backend/.env
          EOF
          fi

      - name: Validate backend runtime env on VPS
        if: ${{ false }}
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
          APP_PATH: ${{ steps.resolve_path.outputs.app_path }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"

          if [ ! -s backend/.env ]; then
            echo "::error::backend/.env is missing or empty on VPS"
            exit 1
          fi

          if ! grep -q '^JWT_SECRET=' backend/.env; then
            generated_jwt="$(openssl rand -hex 32 2>/dev/null || (cat /proc/sys/kernel/random/uuid 2>/dev/null | tr -d '-') || date +%s%N)"
            echo "JWT_SECRET=${generated_jwt}" >> backend/.env
            echo "::warning::JWT_SECRET was missing and has been auto-generated on VPS"
          fi

          if grep -q '^JWT_SECRET=change-me-in-production$' backend/.env; then
            generated_jwt="$(openssl rand -hex 32 2>/dev/null || (cat /proc/sys/kernel/random/uuid 2>/dev/null | tr -d '-') || date +%s%N)"
            awk -v value="$generated_jwt" 'BEGIN{done=0} /^JWT_SECRET=/{print "JWT_SECRET=" value; done=1; next} {print} END{if(!done) print "JWT_SECRET=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "::warning::JWT_SECRET default placeholder replaced with generated value on VPS"
          fi

          if ! grep -q '^FRONTEND_URL=' backend/.env; then
            echo 'FRONTEND_URL=https://repeto.ru,https://www.repeto.ru' >> backend/.env
            echo "FRONTEND_URL was missing and has been set to production defaults"
          fi

          if grep -q '^FRONTEND_URL=http://localhost:3300$' backend/.env; then
            awk 'BEGIN{done=0} /^FRONTEND_URL=/{print "FRONTEND_URL=https://repeto.ru,https://www.repeto.ru"; done=1; next} {print} END{if(!done) print "FRONTEND_URL=https://repeto.ru,https://www.repeto.ru"}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "FRONTEND_URL localhost replaced with production defaults"
          fi

          if ! grep -q '^DATABASE_URL=' backend/.env; then
            echo "::error::DATABASE_URL is missing in backend/.env"
            exit 1
          fi

          db_url="$(grep '^DATABASE_URL=' backend/.env | head -n1 | cut -d= -f2-)"
          normalized_db_url="$(echo "$db_url" | sed -E 's#(://[^@]+@)[^/:]+(:[0-9]+)?/#\1postgres:5432/#')"
          if [ "$normalized_db_url" != "$db_url" ]; then
            awk -v value="$normalized_db_url" 'BEGIN{done=0} /^DATABASE_URL=/{print "DATABASE_URL=" value; done=1; next} {print} END{if(!done) print "DATABASE_URL=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "DATABASE_URL host normalized to postgres for docker deploy"
          fi
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"

          if [ ! -s backend/.env ]; then
            echo "::error::backend/.env is missing or empty on VPS"
            exit 1
          fi

          if ! grep -q '^JWT_SECRET=' backend/.env; then
            generated_jwt="$(openssl rand -hex 32 2>/dev/null || (cat /proc/sys/kernel/random/uuid 2>/dev/null | tr -d '-') || date +%s%N)"
            echo "JWT_SECRET=${generated_jwt}" >> backend/.env
            echo "::warning::JWT_SECRET was missing and has been auto-generated on VPS"
          fi

          if grep -q '^JWT_SECRET=change-me-in-production$' backend/.env; then
            generated_jwt="$(openssl rand -hex 32 2>/dev/null || (cat /proc/sys/kernel/random/uuid 2>/dev/null | tr -d '-') || date +%s%N)"
            awk -v value="$generated_jwt" 'BEGIN{done=0} /^JWT_SECRET=/{print "JWT_SECRET=" value; done=1; next} {print} END{if(!done) print "JWT_SECRET=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "::warning::JWT_SECRET default placeholder replaced with generated value on VPS"
          fi

          if ! grep -q '^FRONTEND_URL=' backend/.env; then
            echo 'FRONTEND_URL=https://repeto.ru,https://www.repeto.ru' >> backend/.env
            echo "FRONTEND_URL was missing and has been set to production defaults"
          fi

          if grep -q '^FRONTEND_URL=http://localhost:3300$' backend/.env; then
            awk 'BEGIN{done=0} /^FRONTEND_URL=/{print "FRONTEND_URL=https://repeto.ru,https://www.repeto.ru"; done=1; next} {print} END{if(!done) print "FRONTEND_URL=https://repeto.ru,https://www.repeto.ru"}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "FRONTEND_URL localhost replaced with production defaults"
          fi

          if ! grep -q '^DATABASE_URL=' backend/.env; then
            echo "::error::DATABASE_URL is missing in backend/.env"
            exit 1
          fi

          db_url="$(grep '^DATABASE_URL=' backend/.env | head -n1 | cut -d= -f2-)"
          normalized_db_url="$(echo "$db_url" | sed -E 's#(://[^@]+@)[^/:]+(:[0-9]+)?/#\1postgres:5432/#')"
          if [ "$normalized_db_url" != "$db_url" ]; then
            awk -v value="$normalized_db_url" 'BEGIN{done=0} /^DATABASE_URL=/{print "DATABASE_URL=" value; done=1; next} {print} END{if(!done) print "DATABASE_URL=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            echo "DATABASE_URL host normalized to postgres for docker deploy"
          fi
          EOF
          fi

      - name: Deploy on VPS
        timeout-minutes: 12
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
          APP_PATH: ${{ steps.resolve_path.outputs.app_path }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          git remote set-url origin https://github.com/SaborataRekaReka/repeto.git || true
          GIT_TERMINAL_PROMPT=0 git fetch --depth=1 origin main
          git checkout main
          git reset --hard origin/main

          if [ ! -s backend/.env ]; then
            echo "::error::backend/.env is missing or empty on VPS"
            exit 1
          fi

          db_url="$(grep '^DATABASE_URL=' backend/.env | head -n1 | cut -d= -f2- | tr -d '\r')"
          if [ -z "$db_url" ]; then
            echo "::error::DATABASE_URL is missing in backend/.env"
            exit 1
          fi

          normalized_db_url="$(echo "$db_url" | sed -E 's#(://[^@]+@)(localhost|127\.0\.0\.1)(:[0-9]+)?/#\1postgres:5432/#')"
          if [ "$normalized_db_url" != "$db_url" ]; then
            awk -v value="$normalized_db_url" 'BEGIN{done=0} /^DATABASE_URL=/{print "DATABASE_URL=" value; done=1; next} {print} END{if(!done) print "DATABASE_URL=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            db_url="$normalized_db_url"
            echo "DATABASE_URL host normalized to postgres:5432 for docker deploy"
          fi

          db_url_body="${db_url#*://}"
          db_creds_host="${db_url_body%%/*}"
          db_name_raw="${db_url_body#*/}"
          db_name_raw="${db_name_raw%%\?*}"
          db_creds_raw="${db_creds_host%@*}"
          db_user_raw="${db_creds_raw%%:*}"
          db_pass_raw="${db_creds_raw#*:}"

          if [ "$db_user_raw" = "$db_creds_raw" ]; then
            db_pass_raw=""
          fi

          url_decode() {
            local data="${1//+/ }"
            printf '%b' "${data//%/\\x}"
          }

          db_user="$(url_decode "$db_user_raw")"
          db_pass="$(url_decode "$db_pass_raw")"
          db_name="$(url_decode "$db_name_raw")"

          if [ -z "$db_user" ] || [ -z "$db_pass" ] || [ -z "$db_name" ]; then
            echo "::error::Failed to parse non-empty DB credentials from DATABASE_URL"
            exit 1
          fi

          export POSTGRES_USER="$db_user"
          export POSTGRES_PASSWORD="$db_pass"
          export POSTGRES_DB="$db_name"

          db_user_sql="$(printf '%s' "$db_user" | sed 's/"/""/g')"
          db_pass_sql="$(printf '%s' "$db_pass" | sed "s/'/''/g")"

          if ! docker compose -f docker-compose.prod.yml up -d postgres; then
            echo "Failed to start postgres service before credential sync"
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true
            exit 1
          fi

          if ! docker compose -f docker-compose.prod.yml exec -T postgres sh -lc "psql -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -v ON_ERROR_STOP=1 -c \"ALTER ROLE \\\"$db_user_sql\\\" WITH LOGIN PASSWORD '$db_pass_sql';\""; then
            echo "Failed to sync postgres role password from DATABASE_URL"
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true
            exit 1
          fi

          if ! docker compose -f docker-compose.prod.yml up -d --build --force-recreate backend frontend nginx --remove-orphans; then
            echo "docker compose up failed. Dumping diagnostics..."
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=200 backend postgres redis nginx || true
            exit 1
          fi

          docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
          docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload
          docker compose -f docker-compose.prod.yml ps
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          git remote set-url origin https://github.com/SaborataRekaReka/repeto.git || true
          GIT_TERMINAL_PROMPT=0 git fetch --depth=1 origin main
          git checkout main
          git reset --hard origin/main

          if [ ! -s backend/.env ]; then
            echo "::error::backend/.env is missing or empty on VPS"
            exit 1
          fi

          db_url="$(grep '^DATABASE_URL=' backend/.env | head -n1 | cut -d= -f2- | tr -d '\r')"
          if [ -z "$db_url" ]; then
            echo "::error::DATABASE_URL is missing in backend/.env"
            exit 1
          fi

          normalized_db_url="$(echo "$db_url" | sed -E 's#(://[^@]+@)(localhost|127\.0\.0\.1)(:[0-9]+)?/#\1postgres:5432/#')"
          if [ "$normalized_db_url" != "$db_url" ]; then
            awk -v value="$normalized_db_url" 'BEGIN{done=0} /^DATABASE_URL=/{print "DATABASE_URL=" value; done=1; next} {print} END{if(!done) print "DATABASE_URL=" value}' backend/.env > backend/.env.tmp
            mv backend/.env.tmp backend/.env
            db_url="$normalized_db_url"
            echo "DATABASE_URL host normalized to postgres:5432 for docker deploy"
          fi

          db_url_body="${db_url#*://}"
          db_creds_host="${db_url_body%%/*}"
          db_name_raw="${db_url_body#*/}"
          db_name_raw="${db_name_raw%%\?*}"
          db_creds_raw="${db_creds_host%@*}"
          db_user_raw="${db_creds_raw%%:*}"
          db_pass_raw="${db_creds_raw#*:}"

          if [ "$db_user_raw" = "$db_creds_raw" ]; then
            db_pass_raw=""
          fi

          url_decode() {
            local data="${1//+/ }"
            printf '%b' "${data//%/\\x}"
          }

          db_user="$(url_decode "$db_user_raw")"
          db_pass="$(url_decode "$db_pass_raw")"
          db_name="$(url_decode "$db_name_raw")"

          if [ -z "$db_user" ] || [ -z "$db_pass" ] || [ -z "$db_name" ]; then
            echo "::error::Failed to parse non-empty DB credentials from DATABASE_URL"
            exit 1
          fi

          export POSTGRES_USER="$db_user"
          export POSTGRES_PASSWORD="$db_pass"
          export POSTGRES_DB="$db_name"

          db_user_sql="$(printf '%s' "$db_user" | sed 's/"/""/g')"
          db_pass_sql="$(printf '%s' "$db_pass" | sed "s/'/''/g")"

          if ! docker compose -f docker-compose.prod.yml up -d postgres; then
            echo "Failed to start postgres service before credential sync"
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true
            exit 1
          fi

          if ! docker compose -f docker-compose.prod.yml exec -T postgres sh -lc "psql -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -v ON_ERROR_STOP=1 -c \"ALTER ROLE \\\"$db_user_sql\\\" WITH LOGIN PASSWORD '$db_pass_sql';\""; then
            echo "Failed to sync postgres role password from DATABASE_URL"
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true
            exit 1
          fi

          if ! docker compose -f docker-compose.prod.yml up -d --build --force-recreate backend frontend nginx --remove-orphans; then
            echo "docker compose up failed. Dumping diagnostics..."
            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=200 backend postgres redis nginx || true
            exit 1
          fi

          docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
          docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload
          docker compose -f docker-compose.prod.yml ps
          EOF
          fi

      - name: Seed demo tutors and students on VPS
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.seed_demo_data == true || inputs.seed_demo_data == 'true') }}
        timeout-minutes: 8
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
          APP_PATH: ${{ steps.resolve_path.outputs.app_path }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          docker compose -f docker-compose.prod.yml exec -T backend sh -lc "ALLOW_PRODUCTION_DEMO_SEED=true NODE_OPTIONS=--max-old-space-size=192 npx ts-node --transpile-only -O '{\"module\":\"CommonJS\",\"moduleResolution\":\"Node\"}' prisma/seed-demo-production.ts"
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          docker compose -f docker-compose.prod.yml exec -T backend sh -lc "ALLOW_PRODUCTION_DEMO_SEED=true NODE_OPTIONS=--max-old-space-size=192 npx ts-node --transpile-only -O '{\"module\":\"CommonJS\",\"moduleResolution\":\"Node\"}' prisma/seed-demo-production.ts"
          EOF
          fi

      - name: Check backend health on VPS
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SELECTED_USER: ${{ steps.resolve_ssh.outputs.selected_user }}
          AUTH_MODE: ${{ steps.resolve_ssh.outputs.auth_mode }}
          APP_PATH: ${{ steps.resolve_path.outputs.app_path }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST:-repeto.ru}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="$SELECTED_USER@$ssh_host"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"

          healthy="false"
          for attempt in $(seq 1 36); do
            backend_cid="$(docker compose -f docker-compose.prod.yml ps -q backend || true)"
            if [ -n "$backend_cid" ]; then
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$backend_cid" 2>/dev/null || true)"
              if [ "$health_status" = "healthy" ]; then
                healthy="true"
                break
              fi
            fi
            sleep 5
          done

          if [ "$healthy" != "true" ]; then
            echo "Backend healthcheck failed. Dumping diagnostics..."
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --no-color --tail=200 backend || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true

            backend_cid="$(docker compose -f docker-compose.prod.yml ps -q backend || true)"
            if [ -n "$backend_cid" ]; then
              docker inspect --format='{{json .State.Health}}' "$backend_cid" || true
            fi

            exit 1
          fi
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "APP_PATH='$APP_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"

          healthy="false"
          for attempt in $(seq 1 36); do
            backend_cid="$(docker compose -f docker-compose.prod.yml ps -q backend || true)"
            if [ -n "$backend_cid" ]; then
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$backend_cid" 2>/dev/null || true)"
              if [ "$health_status" = "healthy" ]; then
                healthy="true"
                break
              fi
            fi
            sleep 5
          done

          if [ "$healthy" != "true" ]; then
            echo "Backend healthcheck failed. Dumping diagnostics..."
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --no-color --tail=200 backend || true
            docker compose -f docker-compose.prod.yml logs --no-color --tail=120 postgres || true

            backend_cid="$(docker compose -f docker-compose.prod.yml ps -q backend || true)"
            if [ -n "$backend_cid" ]; then
              docker inspect --format='{{json .State.Health}}' "$backend_cid" || true
            fi

            exit 1
          fi
          EOF
          fi

      - name: Verify production endpoints
        if: ${{ false }}
        shell: bash
        run: |
          set -euo pipefail

          root_status="$(curl -s -o /dev/null -w "%{http_code}" https://repeto.ru/)"
          api_status="$(curl -s -o /dev/null -w "%{http_code}" https://repeto.ru/api/health)"
          redirect_location="$(curl -sSIL https://repeto.ru/ | awk 'BEGIN {IGNORECASE=1} /^location:/ {print $2}' | tail -n1 | tr -d '\r')"

          echo "Root status: $root_status"
          echo "API status: $api_status"
          echo "Root redirect location: ${redirect_location:-<none>}"

          if [ "$root_status" -ge 500 ]; then
            echo "::error::Frontend root is not healthy"
            exit 1
          fi

          if [ "$api_status" -ge 500 ]; then
            echo "::error::API health endpoint is not healthy"
            exit 1
          fi

          if [ "$redirect_location" = "/bazarly/index.html" ]; then
            echo "::error::Root still redirects to /bazarly/index.html"
            exit 1
          fi
