name: Quality Gate

on:
  pull_request:
    paths:
      - backend/**
      - frontend-gravity/**
      - e2e/**
      - package.json
      - package-lock.json
      - backend/package.json
      - backend/package-lock.json
      - frontend-gravity/package.json
      - frontend-gravity/package-lock.json
      - .github/workflows/quality-gate.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend-gravity/**
      - e2e/**
      - package.json
      - package-lock.json
      - backend/package.json
      - backend/package-lock.json
      - frontend-gravity/package.json
      - frontend-gravity/package-lock.json
      - .github/workflows/quality-gate.yml

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Frontend Lint
        run: npm run lint:frontend

      - name: Backend Lint
        run: npm run lint:backend

      - name: Frontend Build
        run: npm run build:frontend

      - name: Backend Build
        run: npm run build:backend
