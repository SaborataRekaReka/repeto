# Repeto production compose stack (workflow trigger marker v11)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repeto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-repeto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repeto -d repeto"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3200
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  frontend:
    build:
      context: ./frontend-gravity
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    profiles:
      - ops
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    profiles:
      - ops
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-repeto}
      POSTGRES_USER: ${POSTGRES_USER:-repeto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - db_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  certbot_www:
  certbot_etc:
  db_backups:
