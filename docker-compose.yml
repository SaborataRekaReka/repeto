services:
  postgres:
    image: postgres:16-alpine
    container_name: repeto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: repeto
      POSTGRES_PASSWORD: repeto_dev_2026
      POSTGRES_DB: repeto
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: repeto-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
